<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Самые богатые люди</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>
  html,body{ margin:0; background:#081020; }
  #app-root{ --bg:#0C1A33; --surf:#14264A; --surf2:#1A2E57; --steel:#26406F;
    --ice:#4D9DE0; --txt:#EAF1FB; --mut:#93A7C9; --gold:#E6C766; --gold-d:#C9A227; --grow:#36C9A0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    color:var(--txt); display:flex; justify-content:center; padding:18px 0; min-height:100vh; }
  #app-root *{ box-sizing:border-box; }
  .phone{ width:100%; max-width:430px; background:var(--bg); border-radius:28px;
    border:1px solid var(--steel); padding:0; overflow:hidden; animation:fadein .4s ease; }
  @keyframes fadein{ from{opacity:0;} to{opacity:1;} }
  .pad{ padding:20px 20px 16px; }
  .splash{ position:relative; cursor:pointer; }
  .splashbg{ width:100%; height:560px; object-fit:cover; object-position:center top; display:block; }
  .splashover{ position:absolute; left:0; right:0; bottom:0; padding:130px 24px 34px; text-align:center;
    background:linear-gradient(to bottom, rgba(12,26,51,0) 0%, rgba(12,26,51,.5) 42%, #0C1A33 100%); }
  .splashemb{ width:54px; height:54px; margin:0 auto; display:block; }
  .splashname{ font-size:20px; font-weight:700; color:var(--gold); margin-top:8px; letter-spacing:.02em; }
  .loadbar{ width:150px; height:5px; border-radius:99px; background:rgba(255,255,255,.16); margin:18px auto 6px; overflow:hidden; }
  .loadfill{ height:100%; width:8%; background:var(--gold); border-radius:99px; animation:load 1.6s ease forwards; }
  @keyframes load{ from{width:8%;} to{width:100%;} }
  .splashtap{ font-size:11px; color:var(--mut); }
  .wel{ padding:34px 24px 24px; text-align:center; }
  .wlogo{ width:74%; max-width:280px; height:auto; display:block; margin:0 auto; }
  .wslogan{ font-size:16px; color:var(--txt); margin:26px 0 0; line-height:1.45; }
  .wsub{ font-size:13px; color:var(--mut); margin:10px 0 0; }
  .start{ width:100%; height:54px; margin-top:26px; border:none; border-radius:14px;
    background:linear-gradient(180deg,#F0D27C,#D9B44A); color:#241A05; font-size:17px; font-weight:800;
    letter-spacing:.01em; cursor:pointer; box-shadow:0 4px 14px rgba(217,180,74,.28); }
  .start:active{ transform:scale(.985); }
  .cont{ display:block; width:100%; text-align:center; margin-top:14px; background:none;
    border:none; color:var(--mut); font-size:13px; cursor:pointer; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .logo{ display:flex; align-items:center; gap:10px; }
  .logo img{ width:36px; height:36px; display:block; }
  .wm1{ font-size:14px; font-weight:700; line-height:1.05; }
  .wm2{ font-size:10px; letter-spacing:.30em; color:var(--gold); text-transform:uppercase; }
  .lvlpill{ font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px;
    background:var(--surf2); color:var(--gold); border:1px solid var(--steel); white-space:nowrap; }
  .hero{ display:flex; flex-direction:column; align-items:center; margin:4px 0 6px; }
  .medal-wrap{ position:relative; width:168px; height:168px; }
  .medal-num{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .medal-num .n{ font-size:52px; font-weight:700; color:#1B1405; line-height:1; font-variant-numeric:tabular-nums; }
  .medal-num .l{ font-size:12px; font-weight:600; color:#3A2C08; margin-top:2px; }
  .coin{ animation:drop .55s cubic-bezier(.2,.8,.3,1); }
  @keyframes drop{ 0%{transform:translateY(-46px) scale(.7); opacity:0;} 60%{opacity:1;} 100%{transform:translateY(0) scale(1); opacity:1;} }
  .rankzone{ text-align:center; margin:8px 0 4px; }
  .rankeyebrow{ font-size:11px; letter-spacing:.14em; color:var(--mut); text-transform:uppercase; }
  .rankname{ font-size:24px; font-weight:700; color:var(--gold); margin:2px 0 0; }
  .prog{ margin:12px 2px 4px; }
  .prog-top{ display:flex; justify-content:space-between; font-size:12px; color:var(--mut); margin-bottom:7px; }
  .track{ height:8px; background:var(--surf); border-radius:99px; overflow:hidden; }
  .fill{ height:100%; background:var(--gold); border-radius:99px; transition:width .4s ease; }
  .cards{ display:flex; gap:10px; margin:16px 0 4px; }
  .card{ flex:1; background:var(--surf); border:1px solid var(--steel); border-radius:14px; padding:12px 14px; }
  .card .lab{ font-size:12px; color:var(--mut); }
  .card .val{ font-size:20px; font-weight:700; margin-top:3px; font-variant-numeric:tabular-nums; }
  .card .val.green{ color:var(--grow); }
  .row{ display:flex; gap:10px; margin-top:14px; }
  .amount{ flex:1; height:50px; border-radius:14px; background:var(--surf); border:1px solid var(--steel);
    color:var(--txt); font-size:17px; padding:0 16px; outline:none; }
  .amount::placeholder{ color:var(--mut); }
  .amount:focus{ border-color:var(--ice); }
  .btn{ width:100%; height:54px; margin-top:12px; border:none; border-radius:14px;
    background:var(--ice); color:#06203A; font-size:17px; font-weight:700; cursor:pointer; }
  .btn:active{ transform:scale(.985); }
  .btn.done{ background:var(--surf); color:var(--grow); border:1px solid var(--steel); cursor:default; }
  .hint{ text-align:center; font-size:13px; color:var(--mut); margin-top:9px; min-height:18px; }
  .days{ display:flex; gap:5px; justify-content:space-between; margin:16px 2px 4px; }
  .dot{ flex:1; aspect-ratio:1; border-radius:50%; max-width:20px; background:var(--surf);
    border:1px solid var(--steel); display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--mut); }
  .dot.on{ background:var(--gold); border-color:var(--gold-d); color:#1B1405; font-weight:700; }
  .dot.today{ box-shadow:0 0 0 2px var(--ice); }
  .reset{ display:block; width:100%; text-align:center; margin-top:12px; background:none;
    border:none; color:var(--mut); font-size:12px; cursor:pointer; text-decoration:underline; }
  @media (prefers-reduced-motion:reduce){ .coin,.loadfill,.phone{ animation:none; } .loadfill{ width:100%; } }

  var NAMES=["Бедолага","Бедняк","Голь","Копеечник","Студентик","Работяга","Зарплатный воин","Хомяк-заначник","Хранитель копилки","Магнат-самоучка","Барин средней руки","Буржуйчик","Капиталист-энтузиаст","Денежный мешок","Финансовый филин","Процентный рантье","Властелин депозитов","Король дивидендов","Инвест-император","Финансово свободный","Свободный художник денег","Богатырь рублёвый","Крез местного разлива","Олигарх в законе","Финансовый мудрец","Золотой дракон","Повелитель пассивов","Денежный гуру","Ходячий ETF","Миллионер-улыбака","Снежный барс капитала","Хранитель богатства","Капитановладелец","Свободный от будильника","Финансово независимый","Филантроп-весельчак","Инвестор-философ","Денежное божество","Творец изобилия","Финансовый Бог"];
  var NEED=[0,5,10,15,20,25,30,35,40,45,57,69,81,93,105,117,129,141,153,165,190,215,240,265,290,315,340,365,390,415,465,515,565,615,665,715,765,815,865,915];
  var state={ onboarded:false, totalDays:0, totalRub:0, streak:0, lastDate:null, lastDayRub:0, recent:[] };
  var justLogged=false, splashTimer=null;

  function save(){ return storage.set(KEY, JSON.stringify(state)); }
  function z(n){ return String(n).padStart(2,'0'); }
  function ymd(d){ return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
  function today(){ return ymd(new Date()); }
  function yesterday(){ var d=new Date(); d.setDate(d.getDate()-1); return ymd(d); }
  function fmt(n){ return Math.round(n).toLocaleString('ru-RU'); }
  function plDay(n){ return (n%10===1&&n%100!==11)?'день':((n%10>=2&&n%10<=4)&&!(n%100>=12&&n%100<=14))?'дня':'дней'; }

  function dispStreak(){ if(!state.lastDate) return 0; return (state.lastDate===today()||state.lastDate===yesterday())?state.streak:0; }
  function rankInfo(days){ var idx=0; for(var i=0;i<NEED.length;i++){ if(days>=NEED[i]) idx=i; }
    var isMax=idx===NEED.length-1, cur=NEED[idx], nx=isMax?cur:NEED[idx+1], span=nx-cur, got=days-cur;
    return { idx:idx, name:NAMES[idx], next:isMax?null:NAMES[idx+1], remaining:isMax?0:(nx-days), progress:isMax?1:(span?got/span:0), isMax:isMax }; }
  function ring(p){ var r=76,c=2*Math.PI*r,off=c*(1-Math.max(0,Math.min(1,p)));
    return '<svg width="168" height="168" viewBox="0 0 168 168"><circle cx="84" cy="84" r="'+r+'" fill="none" stroke="#26406F" stroke-width="9"/><circle cx="84" cy="84" r="'+r+'" fill="none" stroke="#4D9DE0" stroke-width="9" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 84 84)" style="transition:stroke-dashoffset .5s ease"/><circle cx="84" cy="84" r="62" fill="#E6C766" stroke="#C9A227" stroke-width="3" class="'+(justLogged?'coin':'')+'"/></svg>'; }
  function header(){ return '<div class="logo"><img src="'+EMB+'" alt=""><div><div class="wm1">Самые богатые</div><div class="wm2">люди</div></div></div>'; }
  function strip(){ var out='', t=today(); var rs=state.recent||[];
    for(var i=13;i>=0;i--){ var d=new Date(); d.setDate(d.getDate()-i); var k=ymd(d); var on=rs.indexOf(k)>=0, isT=k===t;
      out+='<div class="dot '+(on?'on':'')+' '+(isT?'today':'')+'">'+(on?'•':'')+'</div>'; } return out; }

  function renderSplash(){
    root.innerHTML='<div class="phone"><div class="splash" id="splash">'+
      '<img class="splashbg" src="'+SPLASH+'" alt="Самые богатые люди">'+
      '<div class="splashover"><img class="splashemb" src="'+EMB+'" alt="">'+
      '<div class="splashname">Самые богатые люди</div>'+
      '<div class="loadbar"><div class="loadfill"></div></div>'+
      '<div class="splashtap">нажмите, чтобы пропустить</div></div></div></div>';
    document.getElementById('splash').onclick=route;
    splashTimer=setTimeout(route,1900);
  }
  function route(){ if(splashTimer){ clearTimeout(splashTimer); splashTimer=null; } state.onboarded?renderTracker():renderWelcome(); }

  function renderWelcome(){
    root.innerHTML='<div class="phone"><div class="wel">'+
      '<img class="wlogo" src="'+FULL+'" alt="Самые богатые люди">'+
      '<p class="wslogan">Каждый день — одна монета.<br>90 дней — и ты другой человек.</p>'+
      '<p class="wsub">40 рангов пути: от Бедолаги до Финансового Бога.</p>'+
      '<button class="start" id="startbtn">Начать путь</button>'+
      '<button class="cont" id="contbtn">Уже в игре? Продолжить</button>'+
    '</div></div>';
    document.getElementById('startbtn').onclick=enter; document.getElementById('contbtn').onclick=enter;
  }
  function enter(){ state.onboarded=true; save(); renderTracker(); }

  function renderTracker(){
    var s=dispStreak(), days=state.totalDays, r=rankInfo(days), didToday=(state.lastDate===today());
    root.innerHTML='<div class="phone"><div class="pad">'+
      '<div class="topbar">'+header()+'<span class="lvlpill">Ур. '+(r.idx+1)+' / 40</span></div>'+
      '<div class="hero"><div class="medal-wrap">'+ring(r.progress)+'<div class="medal-num"><span class="n">'+s+'</span><span class="l">'+plDay(s)+' подряд</span></div></div></div>'+
      '<div class="rankzone"><div class="rankeyebrow">Ваш ранг</div><div class="rankname">'+r.name+'</div></div>'+
      '<div class="prog"><div class="prog-top"><span>'+(r.isMax?'Вершина достигнута':'До «'+r.next+'»')+'</span><span>'+(r.isMax?'максимум':'ещё '+r.remaining+' '+plDay(r.remaining))+'</span></div><div class="track"><div class="fill" style="width:'+Math.round(r.progress*100)+'%"></div></div></div>'+
      '<div class="cards"><div class="card"><div class="lab">Накоплено</div><div class="val green">'+fmt(state.totalRub)+' ₽</div></div><div class="card"><div class="lab">Монет всего</div><div class="val">'+days+'</div></div></div>'+
      '<div class="row"><input class="amount" id="amt" type="number" inputmode="numeric" min="1" placeholder="Сумма, ₽ (по умолч. 100)"></div>'+
      '<button class="btn '+(didToday?'done':'')+'" id="logbtn">'+(didToday?'Сегодня монета есть ✓':'Положить монету сегодня 🪙')+'</button>'+
      '<div class="hint" id="hint">'+(didToday?'Можно добавить ещё — серия не прервётся.':(s>0?'Поставь монету, чтобы продолжить серию.':'Положи первую монету и начни путь.'))+'</div>'+
      '<div class="days">'+strip()+'</div>'+
      '<button class="reset" id="reset">Сбросить прогресс</button>'+
    '</div></div>';
    justLogged=false;
    document.getElementById('logbtn').onclick=onLog;
    document.getElementById('reset').onclick=onReset;
    document.getElementById('amt').addEventListener('keydown',function(e){ if(e.key==='Enter') onLog(); });
  }
  function pushRecent(t){ var set={}; (state.recent||[]).forEach(function(x){set[x]=1;}); set[t]=1;
    state.recent=Object.keys(set).sort().slice(-20); }
  function onLog(){
    var el=document.getElementById('amt'); var v=parseInt(el.value,10); if(!v||v<1) v=100;
    var t=today(), wasNew=(state.lastDate!==t);
    if(wasNew){ state.totalDays+=1; state.totalRub+=v; state.lastDayRub=v;
      state.streak=(state.lastDate===yesterday())?state.streak+1:1; state.lastDate=t; pushRecent(t); }
    else { state.totalRub+=v; state.lastDayRub+=v; }
    justLogged=true; save(); renderTracker();
    if(TG && TG.HapticFeedback){ try{ TG.HapticFeedback.impactOccurred('light'); }catch(e){} }
    var h=document.getElementById('hint'); if(h) h.textContent='Отложено сегодня: '+fmt(state.lastDayRub)+' ₽.'+(wasNew?' +1 монета к рангу!':' Так держать!');
  }
  function onReset(){ if(!confirm('Сбросить весь прогресс?')) return;
    state={ onboarded:true, totalDays:0, totalRub:0, streak:0, lastDate:null, lastDayRub:0, recent:[] }; save(); renderTracker(); }

  function migrate(p){
    if(p && p.log){
      var keys=Object.keys(p.log).sort();
      state.totalDays=keys.length;
      state.totalRub=Object.keys(p.log).reduce(function(a,k){ return a+(+p.log[k]||0); },0);
      state.recent=keys.slice(-20);
      state.lastDate=keys.length?keys[keys.length-1]:null;
      state.lastDayRub=state.lastDate?(+p.log[state.lastDate]||0):0;
      var st=0; if(state.lastDate){ var d=new Date(state.lastDate); while(p.log[ymd(d)]!=null){ st++; d.setDate(d.getDate()-1); } }
      state.streak=st; state.onboarded=!!p.onboarded;
    } else if(p){
      state.onboarded=!!p.onboarded; state.totalDays=p.totalDays||0; state.totalRub=p.totalRub||0;
      state.streak=p.streak||0; state.lastDate=p.lastDate||null; state.lastDayRub=p.lastDayRub||0; state.recent=p.recent||[];
    }
  }

  storage.get(KEY).then(function(raw){
    if(raw){ try{ migrate(JSON.parse(raw)); }catch(e){} }
    renderSplash();
  });
})();
